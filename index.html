<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaji MTK - Official App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#050505',
                        cardBg: '#111111',
                        cardBorder: '#222222',
                        brandYellow: '#e5ff00',
                        textMuted: '#9ca3af',
                    },
                    boxShadow: {
                        'glow-yellow': '0 0 30px rgba(229, 255, 0, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }
        /* Custom Background Glows */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(229,255,0,0.15) 0%, rgba(5,5,5,0) 70%);
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            border-radius: 50%;
            pointer-events: none;
        }
        .bg-glow-purple {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(5,5,5,0) 70%);
            bottom: -300px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            border-radius: 50%;
            pointer-events: none;
        }
        /* Image Logo CSS */
        .logo-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #e5ff00;
            object-fit: cover;
            background: #000;
            box-shadow: 0 0 20px rgba(229, 255, 0, 0.2);
        }
    </style>

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1522698552882369');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1522698552882369&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->

</head>
<body class="antialiased min-h-screen relative font-sans">
    
    <!-- Ambient Background Glows -->
    <div class="bg-glow"></div>
    <div class="bg-glow-purple"></div>

    <div class="max-w-4xl mx-auto px-4 py-12 flex flex-col items-center">
        
        <!-- Logo Section -->
        <div class="mb-6 flex justify-center">
            <!-- 🔴 APNA LOGO YAHA LAGAYE 🔴 -->
            <img src="balaji.png" alt="Balaji MTK Logo" class="logo-image">
        </div>

        <!-- Main Heading -->
        <h1 class="text-4xl md:text-5xl font-extrabold text-center tracking-tight mb-1">
            BALAJI <br class="md:hidden">
            <span class="text-brandYellow">MTK</span>
        </h1>
        <p class="text-textMuted text-xs md:text-sm tracking-[0.3em] uppercase font-semibold mb-8">
            India's No.1 Matka App
        </p>

        <!-- 🔴 APK DOWNLOAD BUTTON 🔴 -->
        <!-- Yahan 'href' ke andar apne App ka naam daalein jaise "balaji-app.apk" -->
        <a href="Aapka_App_Ka_Naam.apk" download class="w-full max-w-md bg-gradient-to-r from-[#f0ff44] to-[#ccff00] text-black font-extrabold py-4 px-8 rounded-xl text-lg hover:scale-105 transition-transform duration-300 shadow-glow-yellow mb-4 uppercase tracking-wide text-center flex justify-center items-center gap-3">
            <i class="fa-solid fa-download text-xl"></i> DOWNLOAD APP
        </a>
        
        <p class="text-gray-400 text-sm mb-6">Trusted by 100K+ Active Users</p>

        <!-- Countdown Timer -->
        <div class="bg-black/50 border border-white/5 rounded-full px-6 py-2 mb-10 flex items-center gap-2 backdrop-blur-sm">
            <span class="text-gray-400 text-sm font-semibold tracking-wider">OFFER ENDS IN:</span>
            <span class="text-red-500 font-bold text-sm tracking-widest" id="countdown">14:59</span>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-3 gap-3 md:gap-6 w-full max-w-2xl mb-8">
            <!-- Card 1 -->
            <div class="bg-cardBg border border-cardBorder rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center text-center transition-colors hover:border-brandYellow/50">
                <i class="fa-solid fa-shield-halved text-brandYellow text-xl md:text-2xl mb-2"></i>
                <h3 class="text-white font-bold text-lg md:text-xl">100%</h3>
                <p class="text-gray-500 text-[10px] md:text-xs font-semibold uppercase tracking-wider">Secure</p>
            </div>
            <!-- Card 2 -->
            <div class="bg-cardBg border border-cardBorder rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center text-center transition-colors hover:border-brandYellow/50">
                <i class="fa-regular fa-star text-brandYellow text-xl md:text-2xl mb-2"></i>
                <h3 class="text-white font-bold text-lg md:text-xl">100K+</h3>
                <p class="text-gray-500 text-[10px] md:text-xs font-semibold uppercase tracking-wider">Downloads</p>
            </div>
            <!-- Card 3 -->
            <div class="bg-cardBg border border-cardBorder rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center text-center transition-colors hover:border-brandYellow/50">
                <i class="fa-solid fa-bolt text-brandYellow text-xl md:text-2xl mb-2"></i>
                <h3 class="text-white font-bold text-lg md:text-xl">Fast</h3>
                <p class="text-gray-500 text-[10px] md:text-xs font-semibold uppercase tracking-wider">Withdrawal</p>
            </div>
        </div>

        <!-- Trust Badges -->
        <div class="flex items-center justify-center gap-4 md:gap-8 text-sm text-gray-400 mb-8">
            <div class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-brandYellow"></i> Verified</div>
            <span class="text-gray-700">•</span>
            <div>Safe & Secure</div>
            <span class="text-gray-700">•</span>
            <div class="flex items-center gap-2"><i class="fa-solid fa-headset text-brandYellow"></i> 24/7 Support</div>
        </div>

    </div>

    <!-- Countdown Script -->
    <script>
        // Set an initial time of 15 minutes
        let timeInSeconds = 15 * 60; 
        const countdownEl = document.getElementById('countdown');

        function updateCountdown() {
            const minutes = Math.floor(timeInSeconds / 60);
            let seconds = timeInSeconds % 60;

            seconds = seconds < 10 ? '0' + seconds : seconds;
            let displayMinutes = minutes < 10 ? '0' + minutes : minutes;

            countdownEl.innerHTML = `${displayMinutes}:${seconds}`;

            if (timeInSeconds > 0) {
                timeInSeconds--;
            } else {
                // Reset or keep at 00:00
                timeInSeconds = 0; 
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown(); // Initial call
    </script>
</body>
</html>
